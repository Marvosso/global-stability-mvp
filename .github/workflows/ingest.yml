name: Ingest GDACS
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run ingest:gdacs
        env:
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          INGEST_BASE_URL: ${{ secrets.APP_BASE_URL }}
          GDACS_RSS_URL: ${{ secrets.GDACS_RSS_URL }}
